services:
  laravel-service:
    container_name: laravel-container
    build:
      context: .
      dockerfile: docker/laravel/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./laravel-app:/var/www/html
      - backend_data:/var/www/html/vendor
      - ./docker/laravel/entrypoint.development.sh:/usr/local/bin/entrypoint.development.sh
    ports:
      - "8000:8000"
    depends_on:
      mysql-service:
        condition: service_healthy
    command: ["bash", "/usr/local/bin/entrypoint.development.sh"]
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    #   interval: 10s
    #   timeout: 30s
    #   retries: 5
    #   start_period: 30s 

  vuejs-service:
    container_name: vuejs-container
    build:
      context: .
      dockerfile: docker/vuejs/Dockerfile
    working_dir: /app
    volumes:
      - ./vuejs-app:/app
      -  frontend_data:/app/node_modules
      - ./docker/vuejs/entrypoint.development.sh:/usr/local/bin/entrypoint.development.sh
    ports:
      - "5173:5173"
    depends_on:
      - laravel-service
      # laravel-service:
      #   condition: service_healthy
    command: ["sh", "/usr/local/bin/entrypoint.development.sh"]

  mysql-service:
    image: mysql:8.0
    container_name: mysql-container
    environment:
      MYSQL_DATABASE: chat_system
      MYSQL_USER: chat_user
      MYSQL_PASSWORD: chat_password
      MYSQL_ROOT_PASSWORD: root
      TZ: UTC
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql
      
  phpmyadmin:
    image: phpmyadmin:5.2.2
    container_name: phpmyadmin-container
    depends_on:
      mysql-service:
        condition: service_healthy
    environment:
      UPLOAD_LIMIT: 50M
      PMA_HOST: mysql-service
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "9000:80"
volumes:
  mysql_data:
  backend_data:
  frontend_data:
